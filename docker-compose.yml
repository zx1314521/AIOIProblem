services:
  postgres:
    image: postgres:16-alpine
    container_name: aioi-postgres
    environment:
      POSTGRES_DB: aioi_problem
      POSTGRES_USER: aioi
      POSTGRES_PASSWORD: aioi_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aioi -d aioi_problem"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

